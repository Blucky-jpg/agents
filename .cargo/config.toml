# Super-workspace cargo config. Merges the rustflags previously declared
# in turso/.cargo/config.toml so they apply when running cargo from the
# super-workspace root (cargo only walks up from the cwd, not down into
# member directories).
#
# The original turso/.cargo/config.toml is kept on disk for reference but
# is NOT consulted by cargo invocations made from this root.

[env]
LIBSQLITE3_FLAGS = "-DSQLITE_ENABLE_MATH_FUNCTIONS" # necessary for rusqlite dependency in order to bundle SQLite with math functions included

[build]
# turso-sync package uses tokio_unstable to seed LocalRuntime and make it deterministic
rustflags = [
    "--cfg=tokio_unstable",
]

[target.'cfg(target_vendor = "apple")']
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=-Wl,-undefined,dynamic_lookup,-no_fixup_chains",
]

[target.'cfg(all(target_os = "linux", target_env = "gnu"))']
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=-Wl,--warn-unresolved-symbols",
  "-C",
  "link-args=-Wl,-z,nodelete",
]

[target.'cfg(target_env = "msvc")']
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=/FORCE"
]

[target.aarch64-linux-android]
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=-Wl,-z,max-page-size=16384",
]

[target.armv7-linux-androideabi]
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=-Wl,-z,max-page-size=16384",
]

[target.x86_64-linux-android]
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=-Wl,-z,max-page-size=16384",
]

[target.i686-linux-android]
rustflags = [
  "--cfg=tokio_unstable",
  "-C",
  "link-args=-Wl,-z,max-page-size=16384",
]
